<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #161b24;
    --border: #242b38;
    --accent: #e8ff3c;
    --accent-dim: rgba(232,255,60,0.12);
    --text: #e8eaf0;
    --muted: #6b7280;
    --card: #1c2333;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 1000;
  }

  header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  .header-stats {
    display: flex;
    gap: 20px;
    margin-left: auto;
  }

  .stat {
    text-align: right;
  }

  .stat-value {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .filter-bar input,
  .filter-bar select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }

  .filter-bar input { flex: 1; min-width: 200px; }
  .filter-bar select { min-width: 160px; }

  .filter-bar input:focus,
  .filter-bar select:focus {
    border-color: var(--accent);
  }

  .filter-bar input::placeholder { color: var(--muted); }
  .filter-bar select option { background: var(--surface); }

  .filter-label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 340px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .job-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px;
  }

  .job-list::-webkit-scrollbar { width: 4px; }
  .job-list::-webkit-scrollbar-track { background: transparent; }
  .job-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .job-card {
    padding: 12px 14px;
    border-radius: 8px;
    margin-bottom: 4px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    background: var(--card);
  }

  .job-card:hover {
    border-color: var(--border);
    background: #212a3a;
  }

  .job-card.active {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .job-card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 5px;
  }

  .job-card-meta {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .job-card-company {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
  }

  .job-card-location {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .job-card-location::before {
    content: '📍';
    font-size: 10px;
  }

  .job-card-date {
    font-size: 11px;
    color: var(--muted);
  }

  /* ── Map ── */
  #map {
    flex: 1;
    background: var(--bg);
  }

  /* ── Loading ── */
  .loading {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 16px;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .loading-text {
    font-size: 14px;
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty state ── */
  .empty {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Leaflet overrides ── */
  .leaflet-container {
    background: #0d1117 !important;
    font-family: 'Inter', sans-serif;
  }

  .leaflet-tile-pane { filter: brightness(0.8) saturate(0.7) hue-rotate(200deg); }

  .leaflet-popup-content-wrapper {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    color: var(--text);
  }

  .leaflet-popup-tip { background: var(--card); }
  .leaflet-popup-close-button { color: var(--muted) !important; font-size: 18px !important; }

  .popup-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .popup-company {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 4px;
  }

  .popup-location {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .popup-link {
    display: inline-block;
    background: var(--accent);
    color: #0d0f14;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    text-decoration: none;
    font-family: 'Space Grotesk', sans-serif;
    transition: opacity 0.15s;
  }

  .popup-link:hover { opacity: 0.85; }

  .cluster-icon {
    background: var(--accent);
    color: #0d0f14;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    border: 2px solid rgba(232,255,60,0.3);
    box-shadow: 0 0 0 4px rgba(232,255,60,0.08);
  }
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">Geocoding job locations…</div>
</div>

<header>
  <h1>Job <span>Map</span></h1>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Total Jobs</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-visible">—</div>
      <div class="stat-label">Visible</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-companies">—</div>
      <div class="stat-label">Companies</div>
    </div>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <input type="text" id="filter-text" placeholder="Search title or company…">
  <select id="filter-company">
    <option value="">All companies</option>
  </select>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-header" id="sidebar-count">Jobs</div>
    <div class="job-list" id="job-list"></div>
  </div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── Map init ──────────────────────────────────────────────
const map = L.map('map', {
  center: [48, 10],
  zoom: 4,
  zoomControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19,
}).addTo(map);

// ── State ─────────────────────────────────────────────────
let allJobs = [];
let markers = {};
let activeCard = null;

// ── Custom marker ─────────────────────────────────────────
function makeIcon(count = 1) {
  const size = count > 1 ? 36 : 28;
  const html = count > 1
    ? `<div class="cluster-icon" style="width:${size}px;height:${size}px">${count}</div>`
    : `<div style="width:${size}px;height:${size}px;background:#e8ff3c;border-radius:50%;
        border:2px solid rgba(232,255,60,0.4);box-shadow:0 0 0 6px rgba(232,255,60,0.1);"></div>`;
  return L.divIcon({ html, className: '', iconSize: [size, size], iconAnchor: [size/2, size/2] });
}

// ── Render ────────────────────────────────────────────────
function render(jobs) {
  // Clear old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  // Clear sidebar
  const list = document.getElementById('job-list');
  list.innerHTML = '';

  if (jobs.length === 0) {
    list.innerHTML = '<div class="empty">No jobs match your filters.</div>';
    updateStats(jobs);
    return;
  }

  // Group by lat/lng to handle overlapping markers
  const grouped = {};
  jobs.forEach(job => {
    const key = `${job.lat.toFixed(4)},${job.lng.toFixed(4)}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(job);
  });

  // Add markers
  Object.entries(grouped).forEach(([key, group]) => {
    const { lat, lng } = group[0];
    const marker = L.marker([lat, lng], { icon: makeIcon(group.length) }).addTo(map);

    const popupHtml = group.map(job => `
      <div style="margin-bottom:${group.length > 1 ? '14px' : '0'};padding-bottom:${group.length > 1 ? '14px' : '0'};
           border-bottom:${group.length > 1 ? '1px solid #242b38' : 'none'}">
        <div class="popup-title">${job.title}</div>
        <div class="popup-company">${job.company}</div>
        <div class="popup-location">📍 ${job.location}</div>
        <a class="popup-link" href="${job.url}" target="_blank">View Job →</a>
      </div>
    `).join('');

    marker.bindPopup(`<div style="min-width:240px;max-width:300px">${popupHtml}</div>`, {
      maxHeight: 320
    });

    group.forEach(job => { markers[job.url] = marker; });
  });

  // Sidebar cards
  jobs.forEach((job, i) => {
    const card = document.createElement('div');
    card.className = 'job-card';
    card.dataset.url = job.url;
    card.innerHTML = `
      <div class="job-card-title">${job.title}</div>
      <div class="job-card-meta">
        <div class="job-card-company">${job.company}</div>
        <div class="job-card-location">${job.location}</div>
      </div>
    `;
    card.addEventListener('click', () => focusJob(job, card));
    list.appendChild(card);
  });

  updateStats(jobs);
  document.getElementById('sidebar-count').textContent =
    `${jobs.length} job${jobs.length !== 1 ? 's' : ''}`;
}

function focusJob(job, card) {
  // Deactivate previous
  if (activeCard) activeCard.classList.remove('active');
  activeCard = card;
  card.classList.add('active');
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  // Pan map and open popup
  map.setView([job.lat, job.lng], Math.max(map.getZoom(), 8), { animate: true });
  const marker = markers[job.url];
  if (marker) {
    marker.openPopup();
  }
}

function updateStats(jobs) {
  document.getElementById('stat-total').textContent = allJobs.length;
  document.getElementById('stat-visible').textContent = jobs.length;
  const companies = new Set(jobs.map(j => j.company).filter(Boolean));
  document.getElementById('stat-companies').textContent = companies.size;
}

// ── Filters ───────────────────────────────────────────────
function applyFilters() {
  const text = document.getElementById('filter-text').value.toLowerCase();
  const company = document.getElementById('filter-company').value;

  const filtered = allJobs.filter(job => {
    const matchText = !text ||
      job.title.toLowerCase().includes(text) ||
      job.company.toLowerCase().includes(text);
    const matchCompany = !company || job.company === company;
    return matchText && matchCompany;
  });

  render(filtered);
}

document.getElementById('filter-text').addEventListener('input', applyFilters);
document.getElementById('filter-company').addEventListener('change', applyFilters);

// ── Load data ─────────────────────────────────────────────
fetch('/api/jobs')
  .then(r => r.json())
  .then(jobs => {
    allJobs = jobs;
    document.getElementById('loading').style.display = 'none';

    // Populate company filter
    const companies = [...new Set(jobs.map(j => j.company).filter(Boolean))].sort();
    const sel = document.getElementById('filter-company');
    companies.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c;
      opt.textContent = c;
      sel.appendChild(opt);
    });

    render(jobs);

    // Fit map to markers
    if (jobs.length > 0) {
      const bounds = L.latLngBounds(jobs.map(j => [j.lat, j.lng]));
      map.fitBounds(bounds, { padding: [40, 40] });
    }
  })
  .catch(err => {
    document.getElementById('loading').innerHTML =
      `<div style="color:#ef4444;font-size:14px">Failed to load jobs: ${err.message}</div>`;
  });
</script>
</body>
</html>
